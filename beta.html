<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photonic Bong</title>
    <style>
        /* ==========================================
           1. MODERN APP DESIGN & STYLING
           ========================================== */
        :root {
            --bg-color: #0f111a;
            --card-color: #1a1d29;
            --primary-color: #e53935;
            --secondary-color: #03dac6;
            --text-main: #ffffff;
            --text-dim: #8b92a5;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center;
        }
        .container { width: 100%; max-width: 500px; padding-bottom: 50px; }
        
        /* Header & Controls */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; display: flex; align-items: center; gap: 8px;}
        
        .status-dot { height: 12px; width: 12px; background-color: red; border-radius: 50%; display: inline-block; }
        .connected-dot { background-color: var(--secondary-color); box-shadow: 0 0 8px var(--secondary-color); }
        
        .card { background: var(--card-color); padding: 18px; border-radius: 16px; margin-bottom: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card-title { font-size: 1rem; color: var(--text-dim); text-transform: uppercase; margin: 0 0 12px 0; letter-spacing: 1px; }
        
        /* Inputs & Buttons */
        input, select { 
            width: 100%; padding: 14px; margin-bottom: 12px; 
            border-radius: 10px; border: 1px solid #2d3142; 
            background: #12141e; color: white; font-size: 1rem; box-sizing: border-box;
        }
        button { 
            width: 100%; padding: 14px; font-size: 1rem; font-weight: bold; 
            border-radius: 10px; border: none; cursor: pointer; 
            transition: 0.2s; color: white;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary-color); }
        .btn-secondary { background: #2d3142; }
        .btn-connect { background: var(--secondary-color); color: #000; margin-bottom: 15px; }
        
        /* Flex rows for UI compactness */
        .flex-row { display: flex; gap: 10px; align-items: center; }
        .flex-row > * { margin-bottom: 0 !important; }

        /* Power Toggle Button */
        #powerBtn { background: #2d3142; color: #fff; padding: 10px 15px; font-size: 0.9rem; border-radius: 8px; width: auto;}
        .power-on { border: 1px solid var(--secondary-color); color: var(--secondary-color) !important; }
        .power-off { border: 1px solid var(--primary-color); color: var(--primary-color) !important; }

        /* Leaderboard */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #2d3142; }
        th { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; }
        tr { cursor: pointer; transition: 0.2s; }
        tr:hover { background: #222636; } /* Highlight row on tap/hover */
        
        tr:nth-child(1) td:nth-child(1) { color: gold; font-weight: bold; font-size: 1.2rem; }
        tr:nth-child(2) td:nth-child(1) { color: silver; font-weight: bold; }
        tr:nth-child(3) td:nth-child(1) { color: #cd7f32; font-weight: bold; }

        /* Hidden Utility Classes */
        .hidden { display: none !important; }

        /* Edit Modal Overlay */
        #editModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content { background: var(--card-color); padding: 25px; border-radius: 16px; width: 90%; max-width: 400px; }
        .modal-title { margin-top: 0; margin-bottom: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1><span id="btDot" class="status-dot"></span> Bong</h1>
        <button id="powerBtn" class="power-on" onclick="togglePower()" disabled>🟢 System ON</button>
    </div>

    <button id="connectBtn" class="btn-connect" onclick="connectBluetooth()">🔌 Connect via Bluetooth</button>

    <div class="card">
        <h2 class="card-title">Next Participant</h2>
        <input type="text" id="playerName" placeholder="Enter name before chugging...">
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h2 class="card-title" style="margin: 0;">Current Event</h2>
            <span style="color: var(--secondary-color); font-size: 0.9rem; font-weight: bold; cursor: pointer;" onclick="toggleNewEventUI()">+ New</span>
        </div>
        
        <select id="eventSelector" onchange="loadSelectedEvent()"></select>

        <div id="newEventUI" class="flex-row hidden" style="margin-top: 10px;">
            <input type="text" id="newEventName" placeholder="Event Name..." style="flex: 2;">
            <button class="btn-secondary" onclick="createNewEvent()" style="flex: 1;">Create</button>
        </div>
    </div>

    <div class="card">
        <h2 class="card-title">Leaderboard (<span id="displayEventName"></span>)</h2>
        <p style="font-size: 0.8rem; color: var(--text-dim); margin-top: -5px;">Tap any entry to edit or delete it.</p>
        <table>
            <thead><tr><th>Rank</th><th>Name</th><th>Time (s)</th></tr></thead>
            <tbody id="leaderboardBody">
                </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="hidden">
    <div class="modal-content">
        <h2 class="modal-title">Edit Record</h2>
        
        <label style="font-size: 0.9rem; color: var(--text-dim);">Player Name:</label>
        <input type="text" id="editNameInput">
        
        <label style="font-size: 0.9rem; color: var(--text-dim);">Move to Event:</label>
        <select id="editEventSelector"></select>

        <div style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-primary" onclick="saveEdit()" style="background: var(--secondary-color); color: #000;">Save Changes</button>
            <button class="btn-primary" onclick="deleteRecord()">🗑️ Delete Record</button>
            <button class="btn-secondary" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // 1. BLUETOOTH CONFIG
    // ==========================================
    const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
    const TX_CHAR_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
    const RX_CHAR_UUID = "8c3b28b4-f6b9-44be-ac90-1c3905e32514";

    let bleDevice = null;
    let rxCharacteristic = null;
    let isPoweredOn = true; // Hardware starts ON by default

    // ==========================================
    // 2. DATA STORAGE & MIGRATION
    // ==========================================
    let appDatabase = JSON.parse(localStorage.getItem('bongDB')) || { "Default Event": [] };
    let currentEvent = localStorage.getItem('bongCurrentEvent') || "Default Event";

    if(!appDatabase[currentEvent]) appDatabase[currentEvent] = [];

    // MIGRATION: Ensure all old records have unique IDs so we can edit them
    for (let evt in appDatabase) {
        appDatabase[evt].forEach(record => {
            if (!record.id) record.id = Math.random().toString(36).substr(2, 9);
        });
    }
    saveData();

    // Init UI
    updateEventDropdown();
    loadSelectedEvent();

    function saveData() {
        localStorage.setItem('bongDB', JSON.stringify(appDatabase));
        localStorage.setItem('bongCurrentEvent', currentEvent);
    }

    // ==========================================
    // 3. UI CONTROLS & EVENT MANAGEMENT
    // ==========================================
    function toggleNewEventUI() {
        document.getElementById("newEventUI").classList.toggle("hidden");
    }

    function createNewEvent() {
        let newName = document.getElementById("newEventName").value.trim();
        if (newName === "") return;
        if (appDatabase[newName]) { alert("Event already exists!"); return; }
        
        appDatabase[newName] = [];
        currentEvent = newName;
        document.getElementById("newEventName").value = "";
        toggleNewEventUI();
        
        saveData();
        updateEventDropdown();
        loadSelectedEvent();
    }

    function updateEventDropdown() {
        let selector = document.getElementById("eventSelector");
        let editSelector = document.getElementById("editEventSelector");
        selector.innerHTML = "";
        editSelector.innerHTML = "";

        for (let eventName in appDatabase) {
            // Main Dropdown
            let option = document.createElement("option");
            option.value = eventName;
            option.text = eventName;
            if (eventName === currentEvent) option.selected = true;
            selector.appendChild(option);

            // Edit Modal Dropdown
            let editOption = document.createElement("option");
            editOption.value = eventName;
            editOption.text = eventName;
            editSelector.appendChild(editOption);
        }
    }

    function loadSelectedEvent() {
        currentEvent = document.getElementById("eventSelector").value;
        document.getElementById("displayEventName").innerText = currentEvent;
        saveData();
        renderLeaderboard();
    }

    function renderLeaderboard() {
        let tbody = document.getElementById("leaderboardBody");
        tbody.innerHTML = "";
        
        let scores = appDatabase[currentEvent];
        scores.sort((a, b) => a.time - b.time); // Sort fastest to slowest

        scores.forEach((entry, index) => {
            let tr = document.createElement("tr");
            // Add click listener to open the edit modal
            tr.onclick = () => openEditModal(currentEvent, entry.id);
            tr.innerHTML = `<td>#${index + 1}</td><td>${entry.name}</td><td>${entry.time.toFixed(3)}s</td>`;
            tbody.appendChild(tr);
        });
    }

    // ==========================================
    // 4. EDIT & DELETE LOGIC
    // ==========================================
    let editingEvent = "";
    let editingRecordId = "";

    function openEditModal(eventName, recordId) {
        editingEvent = eventName;
        editingRecordId = recordId;

        // Find the record
        let record = appDatabase[eventName].find(r => r.id === recordId);
        if(!record) return;

        // Populate Modal Data
        document.getElementById("editNameInput").value = record.name;
        document.getElementById("editEventSelector").value = eventName;

        // Show Modal
        document.getElementById("editModal").classList.remove("hidden");
    }

    function closeEditModal() {
        document.getElementById("editModal").classList.add("hidden");
    }

    function saveEdit() {
        let newName = document.getElementById("editNameInput").value.trim();
        let targetEvent = document.getElementById("editEventSelector").value;
        
        if(newName === "") newName = "Anonymous";

        // Find the record in the old event list and remove it
        let recordIndex = appDatabase[editingEvent].findIndex(r => r.id === editingRecordId);
        if (recordIndex > -1) {
            let record = appDatabase[editingEvent][recordIndex];
            record.name = newName; // Update name

            // If the user changed the event category, move it
            if (editingEvent !== targetEvent) {
                appDatabase[editingEvent].splice(recordIndex, 1); // Remove from old
                appDatabase[targetEvent].push(record); // Add to new
            }
        }

        saveData();
        updateEventDropdown(); // In case we need to refresh selections
        renderLeaderboard();
        closeEditModal();
    }

    function deleteRecord() {
        if(!confirm("Are you sure you want to delete this record forever?")) return;

        let recordIndex = appDatabase[editingEvent].findIndex(r => r.id === editingRecordId);
        if (recordIndex > -1) {
            appDatabase[editingEvent].splice(recordIndex, 1);
        }

        saveData();
        renderLeaderboard();
        closeEditModal();
    }

    // ==========================================
    // 5. BLUETOOTH & HARDWARE COMM
    // ==========================================
    async function connectBluetooth() {
        try {
            document.getElementById('connectBtn').innerText = "Searching...";
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ name: 'PhotonicBong' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            const txCharacteristic = await service.getCharacteristic(TX_CHAR_UUID);
            rxCharacteristic = await service.getCharacteristic(RX_CHAR_UUID);

            await txCharacteristic.startNotifications();
            txCharacteristic.addEventListener('characteristicvaluechanged', handleIncomingData);

            // UI Update
            document.getElementById('btDot').classList.add('connected-dot');
            document.getElementById('connectBtn').style.display = "none";
            document.getElementById('powerBtn').disabled = false;

            bleDevice.addEventListener('gattserverdisconnected', onDisconnected);
        } catch (error) {
            document.getElementById('connectBtn').innerText = "🔌 Connect via Bluetooth";
        }
    }

    function handleIncomingData(event) {
        let value = event.target.value;
        let dataString = new TextDecoder('utf-8').decode(value);
        
        if(dataString.startsWith("DATA,")) {
            let finalTime = parseFloat(dataString.split(",")[1]);
            let inputName = document.getElementById("playerName").value.trim();
            let playerName = inputName !== "" ? inputName : "Anonymous";

            // Push with a unique ID
            appDatabase[currentEvent].push({ 
                id: Math.random().toString(36).substr(2, 9), 
                name: playerName, 
                time: finalTime 
            });

            saveData();
            renderLeaderboard();
            document.getElementById("playerName").value = ""; // Clear input
        }
    }

    async function togglePower() {
        if (!rxCharacteristic) return;
        let btn = document.getElementById("powerBtn");
        let encoder = new TextEncoder('utf-8');
        
        try {
            if (isPoweredOn) {
                // User wants to turn it OFF
                await rxCharacteristic.writeValue(encoder.encode("POWER_OFF"));
                isPoweredOn = false;
                btn.innerText = "🔴 System OFF (Tap to Wake)";
                btn.className = "power-off";
            } else {
                // User wants to turn it ON
                await rxCharacteristic.writeValue(encoder.encode("POWER_ON"));
                isPoweredOn = true;
                btn.innerText = "🟢 System ON (Tap to Sleep)";
                btn.className = "power-on";
            }
        } catch (err) {
            console.error("Failed to send power command", err);
        }
    }

    function onDisconnected() {
        document.getElementById('btDot').classList.remove('connected-dot');
        document.getElementById('connectBtn').style.display = "block";
        document.getElementById('connectBtn').innerText = "🔌 Reconnect Bluetooth";
        document.getElementById('powerBtn').disabled = true;
    }
</script>

</body>
</html>
